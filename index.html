
<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Happy Birthday</title>
		<style>
			:root{
				--purple-1: #2b0052;
				--purple-2: #6a1b9a;
				--accent: #e1bee7;
				--white: #ffffff;
			}
			*{box-sizing:border-box}
			html,body{height:100%}
			body{
				margin:0;
				font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
				background: radial-gradient(ellipse at top left, var(--purple-2), var(--purple-1));
				color:var(--white);
				display:flex;
				align-items:center;
				justify-content:center;
				padding:2rem;
			}
			.card{
				background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
				border: 1px solid rgba(255,255,255,0.08);
				border-radius:16px;
				padding:2rem;
				max-width:900px;
				width:100%;
				box-shadow: 0 10px 30px rgba(0,0,0,0.35);
				position:relative;
				overflow:hidden;
			}
			header{display:flex;align-items:center;gap:1rem}
			.badge{
				width:72px;height:72px;border-radius:50%;
				background:linear-gradient(135deg,var(--accent), rgba(255,255,255,0.12));
				display:flex;align-items:center;justify-content:center;color:var(--purple-1);
				font-weight:700;font-size:28px;flex:0 0 72px
			}
			h1{margin:0;font-size:2.25rem;line-height:1.05}
			p.lead{margin:0.5rem 0 1.25rem;color:rgba(255,255,255,0.9)}

			.actions{display:flex;gap:1rem;flex-wrap:wrap}
			.btn{
				background:var(--accent);
				color:var(--purple-1);
				border:none;padding:0.6rem 1rem;border-radius:10px;font-weight:700;cursor:pointer;
				box-shadow: 0 6px 18px rgba(106,27,154,0.12);
			}
			.btn.ghost{background:transparent;color:var(--accent);border:1px solid rgba(225,190,231,0.22)}

			.message{
				margin-top:1.5rem;
				background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
				padding:1rem;border-radius:12px;border:1px solid rgba(255,255,255,0.03);
				font-size:1.05rem
			}

			/* floating hearts */
			.heart{
				position:absolute;left:50%;top:20%;transform:translateX(-50%);
				width:140px;height:140px;opacity:0.08;filter:blur(6px);
				pointer-events:none;background:radial-gradient(circle at 30% 30%, #ffd1ff, #ff77ff);
				clip-path: path('M10 30 A 20 20 0 0 1 50 30 L 50 30 A 20 20 0 0 1 90 30 Q 90 60 50 95 Q 10 60 10 30 Z');
			}

			/* small animated hearts */
			.hearts-small{
				position:absolute;inset:0;pointer-events:none;overflow:hidden
			}
			.hearts-small i{
				position:absolute;width:14px;height:14px;
				background:linear-gradient(45deg,#ff8ed6,#c88cff);
				transform:rotate(-45deg);border-radius:3px;opacity:0.9
			}
			.hearts-small i:after{content:'';position:absolute;left:0;top:0;width:100%;height:100%;border-radius:3px}

			@keyframes floatUp{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-420px) scale(1.6);opacity:0}}

			.hearts-small i{animation:floatUp 6s linear infinite}

			@media (max-width:600px){
				h1{font-size:1.6rem}
				.badge{width:56px;height:56px;font-size:20px}
			}
		</style>
	</head>
	<body>
		<div class="card" role="main">
			<div class="heart" aria-hidden="true"></div>
			<header>
				<div class="badge">❤️</div>
				<div>
					<h1>Happy Birthday, My Love!</h1>
					<p class="lead">Wishing you a day full of love, laughter, and purple dreams.</p>
					<div class="actions">
						<button class="btn" id="surpriseBtn">Open Surprise</button>
						<button class="btn ghost" id="musicBtn">Play Music</button>
					</div>
				</div>
			</header>

			<div class="message" id="message">
				<p>You're the sparkle in my life and the color in my days. Thank you for being you — forever and always.</p>
			</div>

			<div class="hearts-small" id="hearts"></div>
		</div>

		<script>
			// create floating hearts
			const hearts = document.getElementById('hearts');
			function spawnHeart(){
				const el = document.createElement('i');
				const size = Math.random()*18 + 8;
				el.style.width = size + 'px';
				el.style.height = size + 'px';
				el.style.left = (Math.random()*100) + '%';
				el.style.bottom = '-20px';
				el.style.background = `linear-gradient(45deg, rgba(255,142,214,0.9), rgba(200,140,255,0.9))`;
				el.style.opacity = 0.9;
				el.style.animationDuration = (4 + Math.random()*5) + 's';
				el.style.animationDelay = (Math.random()*2) + 's';
				el.style.transform = 'rotate(-45deg)';
				hearts.appendChild(el);
				setTimeout(()=> el.remove(), 11000);
			}
			for(let i=0;i<10;i++) spawnHeart();
			setInterval(spawnHeart, 800);

			// surprise button: reveal a larger personalized message
			document.getElementById('surpriseBtn').addEventListener('click', ()=>{
				const msg = document.getElementById('message');
				msg.innerHTML = `<h2 style="margin:0 0 .5rem 0;color:var(--accent)">Surprise!</h2><p style="margin:0">I love you more than words — happy birthday. Here’s to our next adventures together. 💜</p>`;
			});

			// audio controls (user must click to allow). To use a local file, place `assets/birthday.mp3` in the repo and replace the src below.
			const musicBtn = document.getElementById('musicBtn');
			const bgAudio = document.createElement('audio');
			bgAudio.id = 'bgAudio';
			bgAudio.src = 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3';
			bgAudio.preload = 'none';
			bgAudio.loop = true;
			document.body.appendChild(bgAudio);
			musicBtn.addEventListener('click', async ()=>{
				try{
					if (bgAudio.paused) {
						await bgAudio.play();
						musicBtn.textContent = 'Pause Music';
					} else {
						bgAudio.pause();
						musicBtn.textContent = 'Play Music';
					}
				} catch (e) {
					musicBtn.textContent = 'Play Music';
				}
			});
		</script>
	</body>
</html>
